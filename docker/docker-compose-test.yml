# Docker Compose configuration for running tests against pre-synced HAF data
# This file is used by e2e_benchmark_on_postgrest CI job in DinD mode
# Unlike docker-compose-sync.yml, this only starts haf and hivemind server (no sync needed)

name: 'hivemind-test'
services:
  haf:
    image: ${HAF_IMAGE_NAME:-registry.gitlab.syncad.com/hive/haf/instance:latest}
    entrypoint: /home/haf_admin/docker_entrypoint.sh
    command: ["--skip-hived"]
    environment:
      HIVED_UID: ${HIVED_UID:-}
      DATADIR: /home/hived/datadir
      # For hivemind, SHM_DIR is inside datadir/blockchain (contains shared_memory.bin)
      SHM_DIR: /home/hived/datadir/blockchain
      PGCTLTIMEOUT: 600
      PG_ACCESS: |
        host    haf_block_log    hivemind         all    trust
        host    haf_block_log    haf_admin        all    trust
        host    postgres         haf_admin        all    trust
    ports:
      - "5432:5432"
    volumes:
      - haf_datadir:/home/hived/datadir
    networks:
      - haf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haf_admin -d haf_block_log"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  hivemind-server:
    image: ${HIVEMIND_IMAGE:-registry.gitlab.syncad.com/hive/hivemind/instance:latest}
    working_dir: /home/hivemind
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for hivemind_app schema..."
        WAIT_TIMEOUT=300
        WAIT_START=$$(date +%s)
        until psql "$${HAF_POSTGRES_URL}" -c "SELECT 1 FROM information_schema.schemata WHERE schema_name='hivemind_app'" 2>/dev/null | grep -q 1; do
          if [[ $$(($$(date +%s) - WAIT_START)) -gt $$WAIT_TIMEOUT ]]; then
            echo "ERROR: Timeout waiting for hivemind_app schema after $${WAIT_TIMEOUT}s"
            exit 1
          fi
          sleep 2
        done
        echo "Hivemind database found, starting server..."
        /home/hivemind/docker_entrypoint.sh server \
          --webserver-port=$${HIVEMIND_PORT:-8080} \
          --log-level=$${LOG_LEVEL:-info}
    environment:
      HAF_POSTGRES_URL: postgresql://hivemind@haf:5432/haf_block_log
      HIVEMIND_PORT: ${HIVEMIND_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HIVEMIND_PORT:-8080}:${HIVEMIND_PORT:-8080}"
    networks:
      - haf-network
    depends_on:
      haf:
        condition: service_healthy

networks:
  haf-network:
    name: haf-network-test

volumes:
  haf_datadir:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${HAF_DATA_DIRECTORY:-/tmp/haf_data}

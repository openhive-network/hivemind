include:
- template: Workflows/Branch-Pipelines.gitlab-ci.yml
- project: hive/haf
  ref: 1ac5d12439b9cca33e6db383adc59967cae75fc4 # develop
  file: /scripts/ci-helpers/prepare_data_image_job.yml   # implicitly pulls base.gitlab-ci.yml from common-ci-configuration

variables:
  # =============================================================================
  # Quick Test / Auto-Skip Mode
  # =============================================================================
  # Two ways to skip builds/sync and use cached data:
  #
  # 1. AUTOMATIC (recommended): When only tests/docs change, sync is
  #    automatically skipped and cached data is used. No configuration needed.
  #
  # 2. MANUAL: Set QUICK_TEST=true to force skip mode with a specific cache:
  #    - QUICK_TEST=true
  #    - QUICK_TEST_HAF_COMMIT=<sha>  (required - HAF commit for cached data)
  #    - QUICK_TEST_HIVEMIND_COMMIT=<sha>  (required - Hivemind commit short SHA)
  #
  # Find available caches: ssh hive-builder-10 'ls -lt /nfs/ci-cache/haf_hivemind_sync/*.tar | head -10'
  # =============================================================================
  QUICK_TEST: "false"
  QUICK_TEST_HAF_COMMIT: ""       # Required when QUICK_TEST=true
  QUICK_TEST_HIVEMIND_COMMIT: ""  # Required when QUICK_TEST=true (short SHA)
  # Auto-populated by detect_changes job:
  AUTO_SKIP_SYNC: "false"         # Set to true when only tests/docs changed
  AUTO_CACHE_KEY: ""              # Cache key to use when skipping sync

  # Override common-ci-configuration version - use latest with cache-manager fixes
  CI_COMMON_JOB_VERSION: "3dd346380da7f28cdaf3ef3955559c905d94bd1c"
  DOCKER_BUILDER_TAG: "$CI_COMMON_JOB_VERSION"
  DOCKER_DIND_TAG: "$CI_COMMON_JOB_VERSION"
  IMAGE_REMOVER_TAG: "$CI_COMMON_JOB_VERSION"
  # CI base image from common-ci-configuration (Python 3.14)
  BUILDER_IMAGE_TAG: ":ubuntu24.04-py3.14-2"
  HIVE_CI_BASE_IMAGE: "registry.gitlab.syncad.com/hive/common-ci-configuration/ci-base-image${BUILDER_IMAGE_TAG}"
  # Python 3.12 image for pydantic-core based tools (pydantic-core doesn't support 3.14 yet)
  PYTHON_COMPAT_IMAGE: "registry.gitlab.syncad.com/hive/common-ci-configuration/python:3.12.9-1"
  # HIVEMIND
  RUNNER_HIVEMIND_SERVER_HTTP_PORT: 8080
  RUNNER_HIVEMIND_BENCHMARK_SERVER_HOSTNAME: hivemind-benchmark
  RUNNER_HIVEMIND_SMOKETEST_SERVER_HOSTNAME: hivemind-smoketest
  # HAF submodule commit - must match the 'ref:' in the include section above
  # This is needed for service containers which can't access dotenv artifacts
  HAF_COMMIT: "1ac5d12439b9cca33e6db383adc59967cae75fc4"
  # HAF
  HAF_POSTGRES_URL: postgresql://hivemind@haf-instance:5432/haf_block_log
  HAF_ADMIN_POSTGRES_URL: postgresql://haf_admin@haf-instance:5432/haf_block_log
  DATA_CACHE_HAF_PREFIX: "/cache/replay_data_haf"
  # NFS cache configuration for sync data sharing across builders
  DATA_CACHE_NFS_PREFIX: "/nfs/ci-cache"
  SYNC_CACHE_KEY: "${HAF_COMMIT}_${CI_COMMIT_SHORT_SHA}"
  SYNC_CACHE_TYPE: "haf_hivemind_sync"  # Must start with 'haf' for cache-manager pgdata permission handling
  BLOCK_LOG_SOURCE_DIR_5M: /blockchain/block_log_5m
  DATA_CACHE_HIVEMIND: "/cache/${SYNC_CACHE_TYPE}_${SYNC_CACHE_KEY}"
  DATA_CACHE_HIVEMIND_DATADIR: "${DATA_CACHE_HIVEMIND}/datadir"
  DATA_CACHE_HIVEMIND_SHM_DIR: "${DATA_CACHE_HIVEMIND_DATADIR}/blockchain"
  # FF:
  FF_NETWORK_PER_BUILD: 1
  # GIT:
  # Fetch strategy reuses workspace between jobs, reducing GitLab server load.
  # Full clone (depth 0) enables efficient incremental fetches - shallow clones
  # don't reduce server CPU and make fetch less effective.
  GIT_STRATEGY: fetch
  GIT_DEPTH: 0
  # Disable automatic submodule fetching - we handle it manually in before_script
  # This is needed because haf contains nested hive submodule with relative URLs
  GIT_SUBMODULE_STRATEGY: none
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  # Allow file:// protocol for nested submodules (required for test-tools in hive)
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: "protocol.file.allow"
  GIT_CONFIG_VALUE_0: "always"
  # Temporary: separate clone path prevents clone-strategy jobs from erasing
  # fetch workspaces during transition. Remove once all projects use fetch.
  GIT_CLONE_PATH: $CI_BUILDS_DIR/fetch/$CI_RUNNER_SHORT_TOKEN/$CI_CONCURRENT_ID/$CI_PROJECT_PATH

  # Other
  CI_DEBUG_SERVICES: "false" #All the service logs should be saved as artifacts, so it's fine to turn this off.
  # Use limited parallel execution (2 workers) due to worker crashes in CI
  # with Python 3.14. Sequential execution (n=0) is too slow.
  RUNNER_PYTEST_WORKERS: "2"

default:
  hooks:
    pre_get_sources_script:
      # Clean corrupt git state left by cancelled pipelines (see GitLab #296638, #4600)
      # Wrapped in subshell to avoid changing working directory for subsequent git operations
      - |
        (
        cd "${CI_PROJECT_DIR:-/builds}" 2>/dev/null || exit 0
        echo "pre_get_sources: checking $(pwd) for corrupt git state"
        if [ -d ".git" ]; then
          # Remove stale lock files that block git operations
          find .git -name "*.lock" -delete 2>/dev/null || true

          # Check if main repo is corrupt - if so, remove .git to force fresh clone
          if ! git rev-parse HEAD >/dev/null 2>&1; then
            echo "pre_get_sources: main repository corrupt, forcing fresh clone"
            rm -rf .git
          else
            # Main repo OK - check and clean corrupt submodules
            # Check both the working dir and .git/modules/ since either can be corrupt
            if [ -f ".gitmodules" ]; then
              git config --file .gitmodules --get-regexp path 2>/dev/null | awk '{print $2}' | while read submod; do
                needs_clean=false
                [ -z "$submod" ] && continue
                # Check if submodule working directory exists but is corrupt
                if [ -d "$submod" ] && [ -f "$submod/.git" ]; then
                  if ! git -C "$submod" rev-parse HEAD >/dev/null 2>&1; then
                    needs_clean=true
                  fi
                fi
                # Check if .git/modules exists but is corrupt (even if working dir is gone)
                if [ -d ".git/modules/$submod" ]; then
                  if ! git --git-dir=".git/modules/$submod" rev-parse HEAD >/dev/null 2>&1; then
                    echo "pre_get_sources: $submod corrupt (rev-parse failed)"
                    needs_clean=true
                  fi
                fi
                if [ "$needs_clean" = true ]; then
                  echo "pre_get_sources: cleaning corrupt submodule: $submod"
                  rm -rf "$submod" ".git/modules/$submod"
                fi
              done
            fi
            echo "pre_get_sources: existing repo OK"
          fi
        else
          echo "pre_get_sources: no .git directory (fresh workspace)"
        fi
        )

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>| ANCHORS |>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>

# Manual submodule initialization - needed because submodules have nested submodules
# with relative URLs that don't work with GIT_SUBMODULE_STRATEGY: recursive
# This initializes haf (with recursive for nested hive), reputation_tracker, and hafah
# (without recursive to avoid their nested haf relative URL issues)
.init_submodules:
  before_script: &init_submodules
    - |
      echo -e "\e[0Ksection_start:$(date +%s):init_submodules[collapsed=true]\r\e[0KInitializing submodules..."
      git config --global --add safe.directory '*'

      # Initialize HAF submodule (with nested hive submodule)
      HAF_URL="https://gitlab.syncad.com/hive/haf.git"
      HAF_SUBMOD_COMMIT=$(git ls-tree HEAD haf | awk '{print $3}')
      echo "Initializing haf submodule at commit $HAF_SUBMOD_COMMIT"
      sudo rm -rf haf 2>/dev/null || rm -rf haf
      git clone --no-checkout "$HAF_URL" haf
      cd haf
      git fetch origin develop
      git checkout $HAF_SUBMOD_COMMIT
      git submodule update --init --recursive --jobs 4
      cd ..

      # Initialize reputation_tracker submodule with nested haf
      REPTRACKER_URL="https://gitlab.syncad.com/hive/reputation_tracker.git"
      REPTRACKER_COMMIT=$(git ls-tree HEAD reputation_tracker | awk '{print $3}')
      echo "Initializing reputation_tracker submodule at commit $REPTRACKER_COMMIT"
      sudo rm -rf reputation_tracker 2>/dev/null || rm -rf reputation_tracker
      git clone --no-checkout "$REPTRACKER_URL" reputation_tracker
      cd reputation_tracker
      git checkout $REPTRACKER_COMMIT
      # Initialize nested haf submodule (using absolute URL since relative ../haf.git won't work)
      NESTED_HAF_COMMIT=$(git ls-tree HEAD haf | awk '{print $3}')
      rm -rf haf
      git clone --no-checkout "$HAF_URL" haf
      cd haf
      git checkout $NESTED_HAF_COMMIT
      git submodule update --init --recursive --jobs 4
      cd ../..

      # Initialize hafah submodule with nested haf
      HAFAH_URL="https://gitlab.syncad.com/hive/HAfAH.git"
      HAFAH_COMMIT=$(git ls-tree HEAD hafah | awk '{print $3}')
      echo "Initializing hafah submodule at commit $HAFAH_COMMIT"
      sudo rm -rf hafah 2>/dev/null || rm -rf hafah
      git clone --no-checkout "$HAFAH_URL" hafah
      cd hafah
      git checkout $HAFAH_COMMIT
      # Initialize nested haf submodule (using absolute URL since relative ../haf.git won't work)
      NESTED_HAF_COMMIT=$(git ls-tree HEAD haf | awk '{print $3}')
      rm -rf haf
      git clone --no-checkout "$HAF_URL" haf
      cd haf
      git checkout $NESTED_HAF_COMMIT
      git submodule update --init --recursive --jobs 4
      cd ../..

      echo -e "\e[0Ksection_end:$(date +%s):init_submodules\r\e[0K"

.shared_tags:
  tags: &shared_tags
  - public-runner-docker
  - hived

.start-timer:
- ./scripts/ci/timer.sh start

.check-timer:
- ./scripts/ci/timer.sh check

.extract-nfs-cache-before-script: &extract-nfs-cache-before-script
  - |
    LOCAL_CACHE="/cache/${SYNC_CACHE_TYPE}_${SYNC_CACHE_KEY}"
    echo "DEBUG: LOCAL_CACHE=${LOCAL_CACHE}"
    echo "DEBUG: SYNC_CACHE_KEY=${SYNC_CACHE_KEY}"
    echo "DEBUG: FORCE_NFS_CACHE=${FORCE_NFS_CACHE:-0}"
    echo "DEBUG: Local cache exists: $([[ -d "${LOCAL_CACHE}/datadir" ]] && echo yes || echo no)"

    # Skip local cache if FORCE_NFS_CACHE is set or local cache doesn't exist
    if [[ "${FORCE_NFS_CACHE:-0}" == "1" ]] || [[ ! -d "${LOCAL_CACHE}/datadir" ]]; then
      echo "Fetching hivemind sync data via cache-manager..."

      # Fetch cache-manager from common-ci-configuration
      CACHE_MANAGER="/tmp/cache-manager.sh"
      if [[ ! -x "$CACHE_MANAGER" ]]; then
        curl -fsSL "https://gitlab.syncad.com/hive/common-ci-configuration/-/raw/develop/scripts/cache-manager.sh" -o "$CACHE_MANAGER"
        chmod +x "$CACHE_MANAGER"
      fi

      # Remove any existing local cache before extraction
      if [[ -e "${LOCAL_CACHE}" ]]; then
        rm -rf "${LOCAL_CACHE}" || sudo rm -rf "${LOCAL_CACHE}" || true
      fi

      "$CACHE_MANAGER" get "${SYNC_CACHE_TYPE}" "${SYNC_CACHE_KEY}" "${LOCAL_CACHE}" || {
        echo "ERROR: Failed to fetch cache via cache-manager"
        exit 1
      }
      echo "Cache ready at: ${LOCAL_CACHE}"
    else
      echo "Using existing local cache: ${LOCAL_CACHE}"
    fi


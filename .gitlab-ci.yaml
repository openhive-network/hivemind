    SUBMODULE_DIR: "$CI_PROJECT_DIR/haf"
    BLOCK_LOG_SOURCE_DIR: $BLOCK_LOG_SOURCE_DIR_5M
    CONFIG_INI_SOURCE: "$CI_PROJECT_DIR/haf/docker/config_5M.ini"
  tags:
  - data-cache-storage
  - fast

# Creates a temporary copy of replay data for the exclusive use of current pipeline
replay_data_copy:
  extends: .job-defaults
  image:
    name: "$HAF_IMAGE_NAME"
    entrypoint: [""]
  stage: build
  needs:
  - prepare_haf_data
  - prepare_haf_image
  variables:
    DATA_CACHE_HAF: "${DATA_CACHE_HAF_PREFIX}_${HAF_COMMIT}"
    DATA_SOURCE: $DATA_CACHE_HAF
    DATADIR: $DATA_CACHE_HIVEMIND_DATADIR
    SHM_DIR: $DATA_CACHE_HIVEMIND_SHM_DIR
  before_script:
  - |
    # Ensure HAF replay data is available locally (fetch from NFS if needed)
    LOCAL_HAF_CACHE="${DATA_CACHE_HAF_PREFIX}_${HAF_COMMIT}"
    if [[ -d "${LOCAL_HAF_CACHE}/datadir" ]]; then
      echo "Local HAF cache found at ${LOCAL_HAF_CACHE}"
    else
      echo "Local HAF cache not found, checking NFS..."
      CACHE_MANAGER="${CI_PROJECT_DIR}/haf/scripts/ci-helpers/cache-manager.sh"
      if [[ -x "$CACHE_MANAGER" ]]; then
        if "$CACHE_MANAGER" get haf "${HAF_COMMIT}" "${LOCAL_HAF_CACHE}"; then
          echo "Fetched HAF replay data from NFS cache"
        else
          echo "ERROR: Failed to fetch HAF replay data from NFS cache"
          exit 1
        fi
      else
        echo "ERROR: cache-manager.sh not found and local cache missing"
        exit 1
      fi
    fi
  script:
  - |
    set -e
    # Create parent directories with appropriate permissions before copy_datadir.sh
    # copy_datadir.sh runs mkdir as hived user, which needs write access to parent dir
    sudo mkdir -p "$DATA_CACHE_HIVEMIND"
    sudo chmod 777 "$DATA_CACHE_HIVEMIND"
    haf/hive/scripts/copy_datadir.sh
    sudo chmod 777 $DATA_CACHE_HIVEMIND
    sudo chmod 777 $DATA_CACHE_HIVEMIND_DATADIR
    # Ensure hived_uid.env exists (some HAF caches may be missing this file)
    if [[ ! -f "$DATA_CACHE_HIVEMIND_DATADIR/hived_uid.env" ]]; then
      echo "hived_uid.env not found in HAF cache, creating with current user ID"
      echo "HIVED_UID=$(id -u)" > "$DATA_CACHE_HIVEMIND_DATADIR/hived_uid.env"
    fi
    cp "$DATA_CACHE_HIVEMIND_DATADIR/hived_uid.env" "$CI_PROJECT_DIR/hived_uid.env"
  artifacts:
    reports:
      dotenv:
      - hived_uid.env
    paths:
    - hived_uid.env
  tags:
  - data-cache-storage
  - fast

prepare_hivemind_image:
  stage: build
  extends: .docker_image_builder_job_template
  needs:
  - prepare_base_images
  before_script:
  - git config --global --add safe.directory $CI_PROJECT_DIR
  script:
  - *instance-build-script
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      dotenv: hivemind_image.env
    paths:
    - hivemind_image.env
  tags: *shared_tags

extract-swagger-json:

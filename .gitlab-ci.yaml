  - fast

# This job cleans up both Hivemind-specific cache and cache shared between projects, so it should be used in emergencies only.
# For example, if prepare_haf_data job fails in the same way in Hivemind and HAfAH.
cleanup_haf_cache_manual:
  extends: .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "/cache/hivemind_sync_* /cache/replay_data_haf_*"
  tags:
  - data-cache-storage
  - fast

# Cleans up cache after tests. Must depend on all jobs that use
# this cache
# TEMPORARILY DISABLED: Changed to manual while debugging e2e issues
cleanup_pipeline_cache:
  needs:
  - replay_data_copy
  - sync
  - e2e_benchmark_on_postgrest
  extends:
  - .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "${DATA_CACHE_HIVEMIND}"
  when: manual
  tags:
  - data-cache-storage
  - fast

sync:
  extends: .docker_image_builder_job_template
  stage: sync
  interruptible: true
  timeout: 1.5h
  needs:
  - job: replay_data_copy
    artifacts: true
  - job: prepare_hivemind_image
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  when: on_success
  variables:
    RUNNER_HIVEMIND_SYNC_MAX_BLOCK: 5000024
    RUNNER_HIVEMIND_SYNC_IRREVERSIBLE_MAX_BLOCK: 4999979
    HIVED_UID: $HIVED_UID
    ADD_MOCKS: "true"
    # Docker compose variables
    HAF_DATADIR: "${DATA_CACHE_HIVEMIND_DATADIR}"
    HAF_SHM_DIR: "${DATA_CACHE_HIVEMIND_SHM_DIR}"
    COMPOSE_FILE: "${CI_PROJECT_DIR}/docker/docker-compose-sync.yml"
  before_script:
  - |
    echo "=== Preparing HAF data for sync job ==="
    docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    # Copy HAF replay data from prepare_haf_data cache to hivemind sync location
    HAF_SOURCE="${DATA_CACHE_HAF_PREFIX}_${HAF_COMMIT}"
    LOCAL_CACHE="${DATA_CACHE_HIVEMIND}"
    HAF_NFS_TAR="${DATA_CACHE_NFS_PREFIX}/haf/${HAF_COMMIT}.tar"

    # Clean up old cache-manager symlinks that could cause cross-contamination
    # (Fixed in cache-manager to use copies instead, but clean up legacy symlinks)
    HAF_SYMLINK="/cache/haf_${HAF_COMMIT}"
    if [[ -L "$HAF_SYMLINK" ]]; then
      echo "Removing old cache-manager symlink: ${HAF_SYMLINK}"
      sudo rm -f "$HAF_SYMLINK" || rm -f "$HAF_SYMLINK" || true
    fi

    # Check if local HAF cache is contaminated (has hivemind-specific files)
    if [[ -f "${HAF_SOURCE}/datadir/hivemind-server.log" ]]; then
      echo "Local HAF cache is contaminated with hivemind data, removing..."
      sudo rm -rf "${HAF_SOURCE}" || rm -rf "${HAF_SOURCE}" || true
    fi

    # If local cache doesn't exist or was removed, extract from NFS
    if [[ ! -d "${HAF_SOURCE}/datadir" ]]; then
      echo "Local HAF cache not found, extracting from NFS: ${HAF_NFS_TAR}"
      if [[ ! -f "$HAF_NFS_TAR" ]]; then
        echo "ERROR: HAF NFS cache not found at ${HAF_NFS_TAR}"
        exit 1
      fi
      mkdir -p "${HAF_SOURCE}"
      if ! sudo tar xf "${HAF_NFS_TAR}" -C "${HAF_SOURCE}"; then
        echo "ERROR: Failed to extract HAF data from NFS"
        exit 1
      fi
      echo "HAF data extracted from NFS successfully"
    fi

    echo "Copying HAF replay data from ${HAF_SOURCE} to ${LOCAL_CACHE}..."
    mkdir -p "${LOCAL_CACHE}"
    # Use tar pipe for reliable copying with proper permissions
    if ! (cd "${HAF_SOURCE}" && sudo tar cf - .) | (cd "${LOCAL_CACHE}" && sudo tar xf -); then
      echo "ERROR: Failed to copy HAF data"
      exit 1
    fi
    echo "HAF data copied successfully"

    # Create blockchain symlinks to shared block_log
    BLOCKCHAIN_DIR="${LOCAL_CACHE}/datadir/blockchain"
    SHARED_BLOCK_LOG="/blockchain/block_log_5m"
    if [[ ! -d "$BLOCKCHAIN_DIR" ]] && [[ -d "$SHARED_BLOCK_LOG" ]]; then
      echo "Creating blockchain symlinks to shared block_log"
      mkdir -p "$BLOCKCHAIN_DIR"
      for block_file in "$SHARED_BLOCK_LOG"/block_log* ; do
        if [[ -f "$block_file" ]]; then
          ln -sf "$block_file" "$BLOCKCHAIN_DIR/$(basename "$block_file")"
        fi
      done
    fi
    # Ensure blockchain dir is writable by hived (uid 1000)
    if [[ -d "$BLOCKCHAIN_DIR" ]]; then
      mkdir -p "$BLOCKCHAIN_DIR/haf_wal"
      chown -R 1000:100 "$BLOCKCHAIN_DIR" 2>/dev/null || chmod -R 777 "$BLOCKCHAIN_DIR" 2>/dev/null || true
    fi

    echo "HAF data prepared at: ${LOCAL_CACHE}"
    ls -la "${LOCAL_CACHE}/datadir/" || true
  script:
  - |
    # Check if valid hivemind sync cache already exists on NFS
    # If so, skip sync entirely - e2e job will use the cached data directly
    NFS_TAR="${DATA_CACHE_NFS_PREFIX}/${SYNC_CACHE_TYPE}/${SYNC_CACHE_KEY}.tar"
    if [[ -f "$NFS_TAR" ]]; then
      echo "=== Hivemind sync cache found at $NFS_TAR ==="
      echo "Skipping sync - e2e job will use cached data directly"
      echo "To force re-sync, delete the cache file or use cleanup_hivemind_haf_cache_manual job"
      exit 0
    fi

    echo "=== Starting hivemind sync with docker-compose ==="
    echo "No existing cache found at $NFS_TAR - running full sync"

    # Export variables for docker-compose
    export HAF_IMAGE="${HAF_IMAGE_NAME}"
    export HIVEMIND_IMAGE="${HIVEMIND_IMAGE}"
    export HAF_DATADIR="${DATA_CACHE_HIVEMIND_DATADIR}"
    export HAF_SHM_DIR="${DATA_CACHE_HIVEMIND_SHM_DIR}"
    export RUNNER_HIVEMIND_SYNC_MAX_BLOCK="${RUNNER_HIVEMIND_SYNC_MAX_BLOCK}"
    export ADD_MOCKS="${ADD_MOCKS}"

    echo "HAF_IMAGE: ${HAF_IMAGE}"
    echo "HIVEMIND_IMAGE: ${HIVEMIND_IMAGE}"
    echo "HAF_DATADIR: ${HAF_DATADIR}"
    echo "RUNNER_HIVEMIND_SYNC_MAX_BLOCK: ${RUNNER_HIVEMIND_SYNC_MAX_BLOCK}"

    # Start docker-compose
    docker compose -f "${COMPOSE_FILE}" up -d haf

    # Wait for HAF to be healthy
    echo "Waiting for HAF PostgreSQL to be healthy..."
    WAIT_TIMEOUT=300
    WAIT_START=$(date +%s)
    until docker compose -f "${COMPOSE_FILE}" exec -T haf pg_isready -U haf_admin -d haf_block_log > /dev/null 2>&1; do
      if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
        echo "ERROR: Timeout waiting for HAF PostgreSQL after ${WAIT_TIMEOUT}s"
        docker compose -f "${COMPOSE_FILE}" logs haf
        exit 1
      fi
      sleep 5
    done
    echo "HAF PostgreSQL is ready"

    # Run hivemind-setup (blocking, wait for completion)
    echo "Running hivemind setup..."
    docker compose -f "${COMPOSE_FILE}" run --rm hivemind-setup

    # Run hivemind-sync (blocking, wait for completion)
    echo "Running hivemind sync..."
    docker compose -f "${COMPOSE_FILE}" run --rm hivemind-sync

    echo "Hivemind sync completed successfully"

    # Extract version info from hivemind container
    docker compose -f "${COMPOSE_FILE}" run --rm --entrypoint /bin/bash hivemind-sync -c \
      "cat /home/hivemind/.hivemind-venv/lib/python*/site-packages/hive/_version.py" > version.log || true

    # Collect DB stats
    docker compose -f "${COMPOSE_FILE}" exec -T haf psql -U haf_admin -d haf_block_log -c "
      SELECT schemaname, relname, n_live_tup, n_dead_tup, last_vacuum, last_autovacuum
      FROM pg_stat_user_tables
      WHERE schemaname IN ('hivemind_app', 'reptracker_app')
      ORDER BY n_live_tup DESC
      LIMIT 20;
    " > pg-stats.txt || true
    mkdir -p pg-stats
    mv pg-stats.txt pg-stats/ || true
  after_script:
  - |
    echo "=== Collecting logs and shutting down ==="

    # Collect container logs
    docker compose -f "${COMPOSE_FILE}" logs haf > hivemind-sync.log 2>&1 || true

    # Force PostgreSQL checkpoint before shutdown
    echo "Forcing PostgreSQL checkpoint..."
    docker compose -f "${COMPOSE_FILE}" exec -T haf psql -U haf_admin -d haf_block_log -c "CHECKPOINT;" || true

    # Graceful shutdown with 120s timeout for PostgreSQL
    # Longer timeout prevents SIGKILL which would trigger crash recovery on next start
    echo "Shutting down docker-compose with 120s timeout..."
    docker compose -f "${COMPOSE_FILE}" down --timeout 120 || true

    echo "Docker-compose shutdown complete"

    # Now PostgreSQL is stopped, safe to push to cache
    CACHE_MANAGER="${CI_PROJECT_DIR}/haf/scripts/ci-helpers/cache-manager.sh"
    if [[ -x "$CACHE_MANAGER" ]]; then
      echo "Pushing hivemind sync data to NFS cache: ${SYNC_CACHE_TYPE}/${SYNC_CACHE_KEY}"
      "$CACHE_MANAGER" put "${SYNC_CACHE_TYPE}" "${SYNC_CACHE_KEY}" "${DATA_CACHE_HIVEMIND}" || echo "Warning: Failed to push to NFS cache"
    else
      echo "Warning: cache-manager.sh not found, skipping NFS cache push"
    fi
  artifacts:
    when: always
    expire_in: 7 days
    paths:
    - hivemind-sync.log
    - pg-stats
    - version.log
  tags:
  - data-cache-storage
  - fast
  - fastest

e2e_benchmark_on_postgrest:
  image: $CI_REGISTRY_IMAGE/ci-base-image:python-3.14-slim-1
  stage: benchmark
  interruptible: true
  needs:
  - job: replay_data_copy
    artifacts: true
  - job: prepare_hivemind_image
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: sync
    artifacts: true
  when: on_success
  services:
  - *haf-instance-with-nfs-fallback
  - name: $HIVEMIND_IMAGE
    alias: hivemind-smoketest   # cannot be a variable
    entrypoint:
    - bash
    - -c
    - *hivemind-postgrest-serve-script
    variables:
      WORKING_DIR: /home/hivemind
      LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/hivemind-server.log
      LOG_LEVEL: "info" # change to "debug" for more info
      REQUEST_PATH_LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/request_process_times_smoketests.log
  - name: $HIVEMIND_IMAGE
    alias: hivemind-benchmark   # cannot be a variable
    entrypoint:
    - bash
    - -c
    - *hivemind-postgrest-serve-script
    variables:
      WORKING_DIR: /home/hivemind
      LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/hivemind-benchmark-server.log
      LOG_LEVEL: "info" # change to "debug" for more info
      REQUEST_PATH_LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/request_process_times.log
  variables:
    HIVED_UID: $HIVED_UID
    JOB_TOKEN: $CI_JOB_TOKEN
    RUNNER_HIVEMIND_BENCHMARK_URL: http://$RUNNER_HIVEMIND_BENCHMARK_SERVER_HOSTNAME
    RUNNER_HIVEMIND_SMOKETEST_URL: http://$RUNNER_HIVEMIND_SMOKETEST_SERVER_HOSTNAME
    # TODO: As you complete the migration of methods to SQL, uncomment variables and add finished method names.
    # Missing variable enables the entire test group.
    RUN_TESTS_WITH_MARKER: "not postgrest_ignore"
    CI_DEBUG_SERVICES: "true" # Debugging service startup issues
    # Set FORCE_NFS_CACHE=1 to skip local cache and always extract from NFS (for debugging)
    FORCE_NFS_CACHE: "${FORCE_NFS_CACHE:-0}"
  before_script:
  - *extract-nfs-cache-before-script
  script:
  - |
    echo "HAF image name $HAF_IMAGE_NAME"
    echo "Hivemind image name $HIVEMIND_IMAGE"
    echo "Waiting for Hivemind smoketest server..."
    WAIT_TIMEOUT=600  # 10 minutes
    WAIT_START=$(date +%s)
    until python3 -c "import urllib.request; urllib.request.urlopen('http://${RUNNER_HIVEMIND_SMOKETEST_SERVER_HOSTNAME}:${RUNNER_HIVEMIND_SERVER_HTTP_PORT}/', timeout=5)" > /dev/null 2>&1; do
      if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
        echo "ERROR: Timeout waiting for Hivemind smoketest server after ${WAIT_TIMEOUT}s"
        exit 1
      fi
      sleep 2
    done
    echo "Hivemind smoketest instance is running"
  - |
    # Debug: check database content directly via psql
    echo "=== DEBUG: Checking database content ==="
    psql "postgresql://haf_admin@haf-instance:5432/haf_block_log" << 'SQLEOF'
    -- Check what schemas exist
    SELECT 'Schemas:' as info, string_agg(schema_name, ', ') as schemas
    FROM information_schema.schemata WHERE schema_name NOT IN ('pg_catalog', 'information_schema', 'pg_toast');

    -- Check what tables exist in hive schema
    SELECT 'hive tables:' as info, string_agg(table_name, ', ') as tables
    FROM information_schema.tables WHERE table_schema = 'hive';

    -- Check tablespace
    SELECT 'Tablespaces:' as info, spcname, pg_tablespace_location(oid) as location FROM pg_tablespace;

    -- Check core HAF data
    SELECT 'hive.blocks count' as table_name, count(*) as row_count FROM hive.blocks;
    SELECT 'hive.accounts count' as table_name, count(*) as row_count FROM hive.accounts;

    -- Check hivemind app data
    SELECT 'hivemind_app.hive_accounts count' as table_name, count(*) as row_count FROM hivemind_app.hive_accounts;
    SELECT 'hivemind_app.hive_posts count' as table_name, count(*) as row_count FROM hivemind_app.hive_posts;

    -- Check if gtg exists
    SELECT 'gtg in hive.accounts' as check_name, EXISTS(SELECT 1 FROM hive.accounts WHERE name='gtg') as exists;
    SELECT 'gtg in hivemind_app.hive_accounts' as check_name, EXISTS(SELECT 1 FROM hivemind_app.hive_accounts WHERE name='gtg') as exists;

    -- Check hivemind_endpoints schema
    SELECT 'hivemind_endpoints functions' as check_name, count(*) as count
    FROM information_schema.routines
    WHERE routine_schema = 'hivemind_endpoints';

    -- Check sample account from hive.accounts
    SELECT 'Sample hive.accounts' as info, name FROM hive.accounts LIMIT 5;
    SQLEOF
    echo "=== END DB DEBUG ==="
  - |
    # Debug: test API calls using Python (curl not available in container)
    echo "=== DEBUG: Testing API responses ==="
    python3 << 'PYEOF'
    import json
    import urllib.request

    HOST = "hivemind-smoketest"
    PORT = "8080"
    URL = f"http://{HOST}:{PORT}/"

    tests = [
        {"jsonrpc": "2.0", "method": "condenser_api.get_follow_count", "params": ["gtg"], "id": 1},
        {"jsonrpc": "2.0", "method": "condenser_api.get_followers", "params": ["gtg", "", "blog", 1], "id": 2},
        {"jsonrpc": "2.0", "method": "bridge.get_trending_topics", "params": {}, "id": 3},
    ]

    for test in tests:
        print(f"\n--- Testing: {test['method']} ---")
        try:
            req = urllib.request.Request(URL, data=json.dumps(test).encode(), headers={"Content-Type": "application/json"})
            with urllib.request.urlopen(req, timeout=10) as resp:
                data = resp.read().decode()
                print(f"Response: {data[:2000]}")
        except Exception as e:
            print(f"Error: {e}")
    PYEOF
    echo "=== END DEBUG ==="
  - *condenser_api_smoketest-script
  - *condenser_api_smoketest_negative-script
  - *follow_api_smoketest-script
  - *follow_api_smoketest_negative-script
  - *bridge_api_smoketest-script
  - *bridge_api_smoketest_negative-script
  - *tags_api_smoketest-script
  - *tags_api_smoketest_negative-script
  - *database_api_smoketest-script
  - *database_api_smoketest_negative-script
  - *rest_api_smoketest-script
  - *rest_api_negative_smoketest-script
  - *hive_api_smoketest-script
  - *search-api_smoketest-script
  - *postgrest_negative-script
  - *mock_tests-script
  - |
    echo "Waiting for Hivemind benchmark server..."
    WAIT_TIMEOUT=600  # 10 minutes
    WAIT_START=$(date +%s)
    until python3 -c "import urllib.request; urllib.request.urlopen('http://${RUNNER_HIVEMIND_BENCHMARK_SERVER_HOSTNAME}:${RUNNER_HIVEMIND_SERVER_HTTP_PORT}/', timeout=5)" > /dev/null 2>&1; do
      if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
        echo "ERROR: Timeout waiting for Hivemind benchmark server after ${WAIT_TIMEOUT}s"
        exit 1
      fi
      sleep 2
    done
    echo "Hivemind benchmark instance is running"
    # TODO: Uncomment anchors to enable a test group. To test only selected methods, add their names to the environment variable
    # - *api-benchmark-script
  after_script:
  - |
    echo -e "\e[0Ksection_start:$(date +%s):logs[collapsed=true]\r\e[0KCollecting logs..."
    ls -lah "${DATA_CACHE_HIVEMIND_DATADIR}"
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/${CI_JOB_NAME}.log" "haf-$CI_JOB_NAME.log" || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/request_process_times_smoketests.log" request_process_times_smoketests.log || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/hivemind-server.log" hivemind-server.log || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/request_process_times.log" request_process_times.log || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/hivemind-benchmark-server.log" hivemind-benchmark-server.log || true
    echo -e "\e[0Ksection_end:$(date +%s):logs\r\e[0K"
  - |
    echo -e "\e[0Ksection_start:$(date +%s):dotenv[collapsed=true]\r\e[0KPreparing dotenv file..."
    {
      echo "ARTIFACTS_JOB_ID=$CI_JOB_ID"
      echo "APP_VERSION=$(python -c "with open('version.log') as f:  exec(f.read()); print(__version__)")"
      echo "SERVER_NAME=$CI_RUNNER_DESCRIPTION"
    } > variables.env
    cat variables.env
    echo -e "\e[0Ksection_end:$(date +%s):dotenv\r\e[0K"
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: "*.xml"
      dotenv: variables.env
    paths:
    - "*.xml"
    - haf-$CI_JOB_NAME.log
    - hivemind-sync.log
    - hivemind-server.log
    - hivemind-benchmark-server.log
    - pg-stats
    - tests/api_tests/hivemind/tavern/**/*.out.json
    - request_process_times.log
    - request_process_times_smoketests.log
    - version.log
  tags:
  - data-cache-storage
  - fast
  - fastest

python_api_client_test:
  extends: .project_develop_configuration_template
  stage: tests
  needs:
  - job: generate_python_api_client
    artifacts: true
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  script:
  - pytest "${PYPROJECT_DIR}/api_client_tests"
  allow_failure: true  # External API (api.syncad.com) dependency - may fail if API is unavailable
  tags:
  - public-runner-docker

build_and_publish_image:
  stage: publish
  extends: .publish_docker_image_template
  before_script:
  - !reference [.publish_docker_image_template, before_script]
  script:
  - |
    TAG=$(echo "$CI_COMMIT_TAG" | sed 's/[!+]/-/g')
    scripts/ci-helpers/build_and_publish_instance.sh --image-tag=$TAG
    docker tag "$CI_REGISTRY_IMAGE/postgrest-rewriter:$TAG" "registry-upload.hive.blog/hivemind/postgrest-rewriter:$TAG"
    docker push "registry-upload.hive.blog/hivemind/postgrest-rewriter:$TAG"
  tags: *shared_tags

deploy_python_api_package_to_gitlab:
  stage: publish
  needs:
  - job: build_python_api_client_wheel
    artifacts: true
  - job: generate_python_api_client
    artifacts: true
  - job: python_api_client_test
  extends: .deploy_wheel_to_gitlab_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  when: on_success
  tags:
  - public-runner-docker

Trigger benchmark-results-collector:
  stage: collector
  needs:
  - job: e2e_benchmark_on_postgrest
    artifacts: true   # Even though variables.env is not a regular artifact, but a dotenv report, this still needs to be set to true
  # NOTE: This job is set to manual because the api-benchmark-script is currently
  # commented out in e2e_benchmark_on_postgrest, so request_process_times.log is not
  # generated. Re-enable automatic triggering when benchmarks are re-enabled.
  rules:
  - when: manual
    allow_failure: true
  variables:
    ARTIFACTS_URL: https://gitlab.syncad.com/api/v4/projects/$CI_PROJECT_ID/jobs/$ARTIFACTS_JOB_ID/artifacts
    PRIVATE_TOKEN: $READ_ARTIFACT_ACCESS_TOKEN
    #description:
    SOURCE: hivemind
    JOB_ID: $ARTIFACTS_JOB_ID
    DESC: "hivemind CI"
    EXEC_ENV_DESC: "branch=$CI_COMMIT_REF_SLUG"
    SERVER_NAME: "$SERVER_NAME"
    APP_VERSION: "$APP_VERSION"
    TESTSUITE_VERSION: "commit_short_sha=$CI_COMMIT_SHORT_SHA"
  trigger:
    project: hive/benchmark-results-collector
    branch: master
    strategy: depend


.hivemind-postgrest-serve-script: &hivemind-postgrest-serve-script |
  # Wait for HAF PostgreSQL to be ready
  echo "Waiting for HAF PostgreSQL to be ready..."
  WAIT_START=$(date +%s)
  WAIT_TIMEOUT=300  # 5 minutes
  until PGPASSWORD="" psql -h haf-instance -U haf_admin -d haf_block_log -c "SELECT 1" > /dev/null 2>&1; do
    if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
      echo "ERROR: Timeout waiting for HAF PostgreSQL after ${WAIT_TIMEOUT}s"
      exit 1
    fi
    sleep 2
  done
  echo "HAF PostgreSQL ready"

  # Wait for PostgreSQL with hivemind_app schema
  echo "Waiting for hivemind_app schema..."
  WAIT_START=$(date +%s)
  until PGPASSWORD="" psql -h haf-instance -U haf_admin -d haf_block_log -c "SELECT 1 FROM information_schema.schemata WHERE schema_name='hivemind_app'" 2>/dev/null | grep -q 1; do
    if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
      echo "ERROR: Timeout waiting for hivemind_app schema after ${WAIT_TIMEOUT}s"
      exit 1
    fi
    sleep 2
  done
  echo "Hivemind database found"

  # Start the server
  ${WORKING_DIR}/docker_entrypoint.sh server --webserver-port=${RUNNER_HIVEMIND_SERVER_HTTP_PORT} --log-level=${LOG_LEVEL}

#<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<| BASH SCRIPTS |<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>| SERVICES |>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>

# HAF instance with NFS fallback for hivemind sync data
# Services start before before_script, so we need fallback logic in the entrypoint
.haf-instance-with-nfs-fallback: &haf-instance-with-nfs-fallback
  name: ${HAF_IMAGE_NAME}
  alias: haf-instance
  variables:
    PGCTLTIMEOUT: 600
    PG_ACCESS: |
      host    haf_block_log    hivemind         all    trust
      host    haf_block_log    haf_admin        all    trust
    DATADIR: "/cache/${SYNC_CACHE_TYPE}_${SYNC_CACHE_KEY}/datadir"
    SHM_DIR: "/cache/${SYNC_CACHE_TYPE}_${SYNC_CACHE_KEY}/datadir/blockchain"
    LOG_FILE: $CI_JOB_NAME.log
    DATA_SOURCE_NFS_PREFIX: "${DATA_CACHE_NFS_PREFIX}"
    DATA_SOURCE_NFS_TYPE: "${SYNC_CACHE_TYPE}"
    DATA_SOURCE_NFS_KEY: "${SYNC_CACHE_KEY}"
    # Set FORCE_NFS_CACHE=1 to skip local cache and always extract from NFS
    FORCE_NFS_CACHE: "${FORCE_NFS_CACHE:-0}"
  entrypoint:
    - '/bin/bash'
    - '-c'
    - |
      set -euo pipefail
      echo "Checking hivemind sync data availability..."
      ORIGINAL_DATADIR="${DATADIR}"
      NFS_PREFIX="${DATA_SOURCE_NFS_PREFIX:-/nfs/ci-cache}"
      NFS_TYPE="${DATA_SOURCE_NFS_TYPE:-haf_hivemind_sync}"
      NFS_KEY="${DATA_SOURCE_NFS_KEY}"
      NFS_TAR="${NFS_PREFIX}/${NFS_TYPE}/${NFS_KEY}.tar"
      NFS_DIR="${NFS_PREFIX}/${NFS_TYPE}/${NFS_KEY}/datadir"
      EXTRACT_DIR=$(dirname "${ORIGINAL_DATADIR}")

      # Function to check if valid data exists
      # Priority: Local cache (if valid) > NFS tar > NFS dir
      # Validity = has pgdata with PG_VERSION and tablespace directory
      # Set FORCE_NFS_CACHE=1 to skip local cache and always use NFS
      check_data_exists() {
        local pgdata="${ORIGINAL_DATADIR}/haf_db_store/pgdata"
        local tablespace="${ORIGINAL_DATADIR}/haf_db_store/tablespace"

        # If FORCE_NFS_CACHE is set, skip local cache check
        if [[ "${FORCE_NFS_CACHE:-0}" == "1" ]]; then
          echo "DEBUG: FORCE_NFS_CACHE=1, skipping local cache check" >&2
        # Check local cache validity (not just existence)
        elif [[ -f "${pgdata}/PG_VERSION" ]] && [[ -d "${tablespace}" ]]; then
          # Basic sanity check: tablespace should have data files
          local tablespace_files
          tablespace_files=$(find "${tablespace}" -type f 2>/dev/null | head -1)
          if [[ -n "$tablespace_files" ]]; then
            echo "local"
            return 0
          else
            echo "DEBUG: Local cache has empty tablespace, trying NFS" >&2
          fi
        fi

        # Try NFS sources
        if [[ -f "${NFS_TAR}" ]]; then
          echo "nfs_tar"
          return 0
        fi
        if [[ -d "${NFS_DIR}" ]]; then
          echo "nfs_dir"
          return 0
        fi
        return 1
      }

      # Wait for data to appear (sync job may still be pushing to NFS)
      MAX_WAIT=600  # 10 minutes
      WAIT_INTERVAL=10
      WAITED=0
      DATA_SOURCE=""

      echo "Waiting for hivemind sync data..."
      echo "  Local: ${ORIGINAL_DATADIR}"
      echo "  NFS tar: ${NFS_TAR}"
      echo "  NFS dir: ${NFS_DIR}"

      while [[ $WAITED -lt $MAX_WAIT ]]; do
        DATA_SOURCE=$(check_data_exists) && break
        echo "Data not yet available, waiting... (${WAITED}s/${MAX_WAIT}s)"
        sleep $WAIT_INTERVAL
        WAITED=$((WAITED + WAIT_INTERVAL))
      done

      if [[ -z "$DATA_SOURCE" ]]; then
        echo "ERROR: Timed out waiting for hivemind sync data after ${MAX_WAIT}s"
        echo "Checked local: ${ORIGINAL_DATADIR}"
        echo "Checked NFS tar: ${NFS_TAR}"
        echo "Checked NFS dir: ${NFS_DIR}"
        ls -la "${NFS_PREFIX}/${NFS_TYPE}/" 2>/dev/null | head -20 || echo "Cannot list ${NFS_PREFIX}/${NFS_TYPE}/"
        exit 1
      fi

      echo "Found data source: ${DATA_SOURCE} (after ${WAITED}s)"

      # Use cache-manager for consistent extraction with proper symlink/permission handling
      CACHE_MANAGER="/home/haf_admin/source/scripts/ci-helpers/cache-manager.sh"

      case "$DATA_SOURCE" in
        local)
          echo "Using local cache: ${ORIGINAL_DATADIR}"
          ;;
        nfs_tar|nfs_dir)
          echo "Using cache-manager to get hivemind sync data..."
          # Local cache invalid or missing - remove it so cache-manager extracts from NFS
          if [[ -d "${EXTRACT_DIR}/datadir" ]]; then
            echo "Removing invalid local cache before NFS extraction..."
            sudo rm -rf "${EXTRACT_DIR}/datadir" 2>/dev/null || rm -rf "${EXTRACT_DIR}/datadir" 2>/dev/null || true
          fi
          # cache-manager handles: extraction, permission restoration, symlink fixing
          if [[ -x "$CACHE_MANAGER" ]]; then
            "$CACHE_MANAGER" get "${NFS_TYPE}" "${NFS_KEY}" "${EXTRACT_DIR}"
          else
            echo "ERROR: cache-manager not found at $CACHE_MANAGER"
            exit 1
          fi
          export DATADIR="${EXTRACT_DIR}/datadir"
          export SHM_DIR="${DATADIR}/blockchain"
          echo "Using extracted data: ${DATADIR}"
          ;;
      esac

      # Run docker_entrypoint.sh with passed arguments
      exec /home/haf_admin/docker_entrypoint.sh "$@"
    - '/bin/bash'
  command: ["--skip-hived"]  # Only run PostgreSQL, hivemind sync already completed

#<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<| SERVICES |<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

#>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>| JOBS |>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>

# =============================================================================
# Change Detection & Quick Test Setup
# =============================================================================
# Detects if only tests/docs changed, finds cached sync data, and exports
# variables for downstream jobs:
#   AUTO_SKIP_SYNC  - true if sync can be skipped
#   SYNC_CACHE_KEY  - cache key to use (HAF_COMMIT_HIVEMIND_SHORT_SHA)
detect_changes:
  stage: detect
  image: "$HIVE_CI_BASE_IMAGE"
  rules:
    # Skip for tags (always do full build for releases)
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  before_script:
    - apt-get update -qq && apt-get install -y -qq docker.io >/dev/null
  script:
    - |
      set -euo pipefail

      # Initialize defaults
      CAN_SKIP_SYNC=false
      CACHE_KEY=""

      # Handle manual QUICK_TEST mode
      if [[ "$QUICK_TEST" == "true" ]]; then
        echo "=== Manual QUICK_TEST Mode ==="
        CAN_SKIP_SYNC=true
        if [[ -z "$QUICK_TEST_HAF_COMMIT" ]] || [[ -z "$QUICK_TEST_HIVEMIND_COMMIT" ]]; then
          echo "ERROR: QUICK_TEST=true requires both QUICK_TEST_HAF_COMMIT and QUICK_TEST_HIVEMIND_COMMIT"
          echo ""
          echo "Find available caches:"
          echo "  ssh hive-builder-10 'ls -lt /nfs/ci-cache/haf_hivemind_sync/*.tar | head -10'"
          exit 1
        fi
        CACHE_KEY="${QUICK_TEST_HAF_COMMIT}_${QUICK_TEST_HIVEMIND_COMMIT}"
        echo "Using cache key: $CACHE_KEY"
      else
        # Automatic detection mode
        echo "=== Detecting Changed Files ==="

        # Get changed files based on pipeline type
        if [[ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-}" ]]; then
          BASE_SHA="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
          echo "MR pipeline: comparing against target branch"
        elif [[ "${CI_PIPELINE_SOURCE:-}" == "push" ]]; then
          # For push pipelines with shallow clone, fetch more history
          echo "Push pipeline: fetching history for comparison..."
          git fetch --deepen=2 origin "${CI_COMMIT_REF_NAME}" 2>/dev/null || true
          BASE_SHA="HEAD~1"
          echo "Push pipeline: comparing against previous commit"
        else
          # Fetch develop branch for comparison
          git fetch origin develop --depth=1 2>/dev/null || true
          BASE_SHA=$(git merge-base HEAD origin/develop 2>/dev/null || echo "")
          if [[ -z "$BASE_SHA" ]]; then
            echo "Cannot determine base - assuming full sync needed"
            CAN_SKIP_SYNC=false
          else
            echo "Other pipeline: comparing against develop"
          fi
        fi

        # Get changed files (skip if we already determined full sync needed)
        CHANGED_FILES=""
        if [[ "$CAN_SKIP_SYNC" != "false" ]] && [[ -n "$BASE_SHA" ]]; then
          echo "Comparing $BASE_SHA to HEAD"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || echo "")
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "Cannot determine changed files - assuming full sync needed"
            CAN_SKIP_SYNC=false
          fi
        fi

        if [[ -n "$CHANGED_FILES" ]]; then
          echo "Changed files:"
          echo "$CHANGED_FILES" | head -50

          # Skip sync when only tests, docs, or non-code files change
          # SQL changes DO require sync (they affect database schema/functions)
          SKIP_SYNC_PATTERNS="^tests/|^docs/|\.md$|^README|^CHANGELOG|^LICENSE|^CLAUDE\.md$|^\.gitlab-ci\.yaml$"

          NEEDS_SYNC=$(echo "$CHANGED_FILES" | grep -vE "$SKIP_SYNC_PATTERNS" || true)

          if [[ -z "$NEEDS_SYNC" ]]; then
            echo ""
            echo "=== Can skip sync (only tests/docs/CI config changed) ==="
            CAN_SKIP_SYNC=true
          else
            echo ""
            echo "=== Full sync required ==="
            echo "Files requiring sync:"
            echo "$NEEDS_SYNC" | head -20
          fi
        fi  # end of CHANGED_FILES check

        # Find cached data when we can skip sync
        if [[ "$CAN_SKIP_SYNC" == "true" ]]; then
          echo ""
          echo "Looking for cached hivemind sync data..."

          # Docker login for image verification
          echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin "$CI_REGISTRY" 2>/dev/null || true

          NFS_CACHE_PATH="/nfs/ci-cache/haf_hivemind_sync"
          if [[ -d "$NFS_CACHE_PATH" ]]; then
            # Look through recent cache files to find one with valid images
            for TAR in $(ls -t "$NFS_CACHE_PATH"/*.tar 2>/dev/null | head -10); do
              TEST_KEY=$(basename "$TAR" .tar)
              # Extract HAF commit (first part before underscore)
              TEST_HAF_COMMIT="${TEST_KEY%%_*}"
              TEST_SHORT="${TEST_HAF_COMMIT:0:8}"

              # Verify HAF Docker image exists
              HAF_IMG="registry.gitlab.syncad.com/hive/haf:${TEST_SHORT}"
              if docker manifest inspect "$HAF_IMG" >/dev/null 2>&1; then
                CACHE_KEY="$TEST_KEY"
                echo "Found cached data with valid HAF image: $CACHE_KEY"
                echo "HAF image: $HAF_IMG"
                break
              else
                echo "Cache $TEST_KEY missing HAF image ($HAF_IMG), trying next..."
              fi
            done
          fi

          if [[ -z "$CACHE_KEY" ]]; then
            echo "WARNING: No cached data with valid images found - cannot skip sync"
            CAN_SKIP_SYNC=false
          fi
        fi
      fi

      # Export results
      echo "AUTO_SKIP_SYNC=$CAN_SKIP_SYNC" >> detect_changes.env
      if [[ -n "$CACHE_KEY" ]]; then
        echo "SYNC_CACHE_KEY=$CACHE_KEY" >> detect_changes.env
        # Also export the HAF commit for image lookup
        HAF_FROM_CACHE="${CACHE_KEY%%_*}"
        echo "AUTO_HAF_COMMIT=$HAF_FROM_CACHE" >> detect_changes.env
      fi

      echo ""
      echo "=== Summary ==="
      cat detect_changes.env
  artifacts:
    reports:
      dotenv: detect_changes.env
    expire_in: 1 day
  tags:
    - data-cache-storage  # Needs NFS access to find caches

validate_haf_commit:
  stage: build
  image: "$HIVE_CI_BASE_IMAGE"
  script:
  - |
    # Validate that HAF_COMMIT variable matches both the submodule and include ref
    # This prevents cache misses due to mismatched commits
    # Use git ls-tree to get the expected submodule commit (not stale cache data)
    SUBMODULE_COMMIT=$(git ls-tree HEAD haf | awk '{print $3}')
    # Extract include ref - use grep -m1 to avoid SIGPIPE from head
    INCLUDE_REF=$(grep -A2 "project:.*hive/haf" .gitlab-ci.yaml | grep -m1 "ref:" | sed 's/.*ref: *\([a-f0-9]*\).*/\1/')

    echo "HAF_COMMIT variable: $HAF_COMMIT"
    echo "HAF submodule HEAD:  $SUBMODULE_COMMIT"
    echo "Include ref:         $INCLUDE_REF"

    ERRORS=0
    if [ "$HAF_COMMIT" != "$SUBMODULE_COMMIT" ]; then
      echo "ERROR: HAF_COMMIT variable does not match submodule commit!"
      echo "       Update HAF_COMMIT in .gitlab-ci.yaml to: $SUBMODULE_COMMIT"
      ERRORS=1
    fi
    if [ "$HAF_COMMIT" != "$INCLUDE_REF" ]; then
      echo "ERROR: HAF_COMMIT variable does not match include ref!"
      echo "       Both should be: $HAF_COMMIT"
      ERRORS=1
    fi
    if [ $ERRORS -eq 1 ]; then
      echo ""
      echo "To fix: ensure HAF_COMMIT, include ref, and submodule all use the same commit"
      exit 1
    fi
    echo "All HAF commit references are consistent"
  tags:
  - public-runner-docker

# Build base images if they're missing from registry
prepare_base_images:
  stage: build
  extends: .docker_image_builder_job_template
  before_script:
  - git config --global --add safe.directory $CI_PROJECT_DIR
  script:
  - *base-image-build-script
  tags: *shared_tags

prepare_haf_image:
  stage: build
  extends: .prepare_haf_image
  variables:
    SUBMODULE_DIR: "$CI_PROJECT_DIR/haf"
    REGISTRY_USER: "$HAF_IMG_BUILDER_USER"
    REGISTRY_PASS: "$HAF_IMG_BUILDER_PASSWORD"
  before_script: *init_submodules
  tags: *shared_tags

prepare_haf_data:
  extends: .prepare_haf_data_5m
  needs:
  - job: prepare_haf_image
    artifacts: true
  stage: build
  variables:
    SUBMODULE_DIR: "$CI_PROJECT_DIR/haf"
    BLOCK_LOG_SOURCE_DIR: $BLOCK_LOG_SOURCE_DIR_5M
    CONFIG_INI_SOURCE: "$CI_PROJECT_DIR/haf/docker/config_5M.ini"
  before_script: *init_submodules
  tags:
  - data-cache-storage
  - fast

# Creates a temporary copy of replay data for the exclusive use of current pipeline
replay_data_copy:
  extends: .job-defaults
  image:
    name: "$HAF_IMAGE_NAME"
    entrypoint: [""]
  stage: build
  needs:
  - prepare_haf_data
  - prepare_haf_image
  variables:
    DATA_CACHE_HAF: "${DATA_CACHE_HAF_PREFIX}_${HAF_COMMIT}"
    DATA_SOURCE: $DATA_CACHE_HAF
    DATADIR: $DATA_CACHE_HIVEMIND_DATADIR
    SHM_DIR: $DATA_CACHE_HIVEMIND_SHM_DIR
  before_script:
  - |
    # Ensure HAF replay data is available locally (fetch from NFS if needed)
    LOCAL_HAF_CACHE="${DATA_CACHE_HAF_PREFIX}_${HAF_COMMIT}"
    if [[ -d "${LOCAL_HAF_CACHE}/datadir" ]]; then
      echo "Local HAF cache found at ${LOCAL_HAF_CACHE}"
    else
      echo "Local HAF cache not found, fetching from NFS..."
      # Fetch cache-manager from common-ci-configuration
      CACHE_MANAGER="/tmp/cache-manager.sh"
      if [[ ! -x "$CACHE_MANAGER" ]]; then
        curl -fsSL "https://gitlab.syncad.com/hive/common-ci-configuration/-/raw/develop/scripts/cache-manager.sh" -o "$CACHE_MANAGER"
        chmod +x "$CACHE_MANAGER"
      fi
      if "$CACHE_MANAGER" get haf "${HAF_COMMIT}" "${LOCAL_HAF_CACHE}"; then
        echo "Fetched HAF replay data from NFS cache"
      else
        echo "ERROR: Failed to fetch HAF replay data from NFS cache"
        exit 1
      fi
    fi
  script:
  - |
    set -e
    # Create parent directories with appropriate permissions before copy_datadir.sh
    # copy_datadir.sh runs mkdir as hived user, which needs write access to parent dir
    sudo mkdir -p "$DATA_CACHE_HIVEMIND"
    sudo chmod 777 "$DATA_CACHE_HIVEMIND"
    # Use HAF Docker image's built-in script (no git available in HAF image)
    /home/haf_admin/source/hive/scripts/copy_datadir.sh
    sudo chmod 777 $DATA_CACHE_HIVEMIND
    sudo chmod 777 $DATA_CACHE_HIVEMIND_DATADIR
    # Ensure hived_uid.env exists (some HAF caches may be missing this file)
    if [[ ! -f "$DATA_CACHE_HIVEMIND_DATADIR/hived_uid.env" ]]; then
      echo "hived_uid.env not found in HAF cache, creating with current user ID"
      echo "HIVED_UID=$(id -u)" > "$DATA_CACHE_HIVEMIND_DATADIR/hived_uid.env"
    fi
    cp "$DATA_CACHE_HIVEMIND_DATADIR/hived_uid.env" "$CI_PROJECT_DIR/hived_uid.env"
  artifacts:
    reports:
      dotenv:
      - hived_uid.env
    paths:
    - hived_uid.env
  tags:
  - data-cache-storage
  - fast

prepare_hivemind_image:
  stage: build
  extends: .docker_image_builder_job_template
  needs:
  - prepare_base_images
  before_script: *init_submodules
  script:
  - *instance-build-script
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      dotenv: hivemind_image.env
    paths:
    - hivemind_image.env
  tags: *shared_tags

extract-swagger-json:
  extends: .filter_out_swagger_json
  stage: build
  variables:
    INPUT_SQL_SWAGGER_FILE: "${CI_PROJECT_DIR}/hive/db/sql_scripts/endpoints/endpoint_schema.sql"
  tags:
  - public-runner-docker

generate_python_api_client:
  extends: .project_develop_configuration_template
  stage: build
  image: "${PYTHON_COMPAT_IMAGE}"
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  needs:
  - job: extract-swagger-json
    artifacts: true
  script:
  - ${PYPROJECT_DIR}/generate_hivemind_api_client.sh
  artifacts:
    paths:
    - "${PYPROJECT_DIR}/hivemind_api"
    - "${PYPROJECT_DIR}/hivemind_api/hivemind_api_client"
  tags:
  - public-runner-docker


build_python_api_client_wheel:
  extends: .build_wheel_template
  stage: build
  needs:
  - job: generate_python_api_client
    artifacts: true
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  tags:
  - public-runner-docker

cleanup_hivemind_haf_cache_manual:
  extends: .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "/cache/haf_hivemind_sync_*"
  tags:
  - data-cache-storage
  - fast

# This job cleans up both Hivemind-specific cache and cache shared between projects, so it should be used in emergencies only.
# For example, if prepare_haf_data job fails in the same way in Hivemind and HAfAH.
cleanup_haf_cache_manual:
  extends: .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "/cache/haf_hivemind_sync_* /cache/replay_data_haf_*"
  tags:
  - data-cache-storage
  - fast

# Cleans up cache after tests. Must depend on all jobs that use
# this cache
# TEMPORARILY DISABLED: Changed to manual while debugging e2e issues
cleanup_pipeline_cache:
  needs:
  - replay_data_copy
  - sync
  - e2e_benchmark_on_postgrest
  extends:
  - .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "${DATA_CACHE_HIVEMIND}"
  when: manual
  tags:
  - data-cache-storage
  - fast

sync:
  extends: .docker_image_builder_job_template
  stage: sync
  interruptible: true
  timeout: 1.5h
  needs:
  - job: detect_changes
    artifacts: true
    optional: true  # Optional for tagged builds
  - job: replay_data_copy
    artifacts: true
  - job: prepare_hivemind_image
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  when: on_success
  variables:
    RUNNER_HIVEMIND_SYNC_MAX_BLOCK: 5000024
    RUNNER_HIVEMIND_SYNC_IRREVERSIBLE_MAX_BLOCK: 4999979
    HIVED_UID: $HIVED_UID
    ADD_MOCKS: "true"
    # Docker compose variables
    HAF_DATADIR: "${DATA_CACHE_HIVEMIND_DATADIR}"
    HAF_SHM_DIR: "${DATA_CACHE_HIVEMIND_SHM_DIR}"
    COMPOSE_FILE: "${CI_PROJECT_DIR}/docker/docker-compose-sync.yml"
  before_script:
  - |
    # Check for skip mode (QUICK_TEST or AUTO_SKIP_SYNC)
    SYNC_SKIPPED=false
    if [[ "${QUICK_TEST:-false}" == "true" ]] || [[ "${AUTO_SKIP_SYNC:-false}" == "true" ]]; then
      echo "=== Skipping sync (using cached data) ==="
      echo "QUICK_TEST=${QUICK_TEST:-false}"
      echo "AUTO_SKIP_SYNC=${AUTO_SKIP_SYNC:-false}"
      echo "SYNC_CACHE_KEY=${SYNC_CACHE_KEY}"

      # Fetch cache-manager from common-ci-configuration
      CACHE_MANAGER="/tmp/cache-manager.sh"
      if [[ ! -x "$CACHE_MANAGER" ]]; then
        curl -fsSL "https://gitlab.syncad.com/hive/common-ci-configuration/-/raw/develop/scripts/cache-manager.sh" -o "$CACHE_MANAGER"
        chmod +x "$CACHE_MANAGER"
      fi

      # Use cache-manager to get cached hivemind sync data
      LOCAL_CACHE="/cache/${SYNC_CACHE_TYPE}_${SYNC_CACHE_KEY}"
      echo "Fetching cached hivemind sync data via cache-manager..."
      "$CACHE_MANAGER" get "${SYNC_CACHE_TYPE}" "${SYNC_CACHE_KEY}" "${LOCAL_CACHE}" || {
        echo "ERROR: No cached data found for key: ${SYNC_CACHE_KEY}"
        echo ""
        echo "Available ${SYNC_CACHE_TYPE} caches:"
        "$CACHE_MANAGER" list "${SYNC_CACHE_TYPE}" 2>/dev/null | head -10 || echo "(cache-manager list failed)"
        exit 1
      }
      echo "Cached data ready at: $LOCAL_CACHE"
      echo "Sync skipped - using cached data from: $SYNC_CACHE_KEY"

      # Mark that sync was skipped (for after_script)
      touch "${CI_PROJECT_DIR}/.sync_skipped"
      SYNC_SKIPPED=true
    fi

    if [[ "$SYNC_SKIPPED" == "false" ]]; then
      echo "=== Preparing HAF data for sync job ==="
      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    # Copy HAF replay data from prepare_haf_data cache to hivemind sync location
    HAF_SOURCE="${DATA_CACHE_HAF_PREFIX}_${HAF_COMMIT}"
    LOCAL_CACHE="${DATA_CACHE_HIVEMIND}"
    HAF_NFS_TAR="${DATA_CACHE_NFS_PREFIX}/haf/${HAF_COMMIT}.tar"

    # Clean up old cache-manager symlinks that could cause cross-contamination
    # (Fixed in cache-manager to use copies instead, but clean up legacy symlinks)
    HAF_SYMLINK="/cache/haf_${HAF_COMMIT}"
    if [[ -L "$HAF_SYMLINK" ]]; then
      echo "Removing old cache-manager symlink: ${HAF_SYMLINK}"
      sudo rm -f "$HAF_SYMLINK" || rm -f "$HAF_SYMLINK" || true
    fi

    # Check if local HAF cache is contaminated (has hivemind-specific files)
    if [[ -f "${HAF_SOURCE}/datadir/hivemind-server.log" ]]; then
      echo "Local HAF cache is contaminated with hivemind data, removing..."
      sudo rm -rf "${HAF_SOURCE}" || rm -rf "${HAF_SOURCE}" || true
    fi

    # Fetch cache-manager from common-ci-configuration
    CACHE_MANAGER="/tmp/cache-manager.sh"
    if [[ ! -x "$CACHE_MANAGER" ]]; then
      curl -fsSL "https://gitlab.syncad.com/hive/common-ci-configuration/-/raw/develop/scripts/cache-manager.sh" -o "$CACHE_MANAGER"
      chmod +x "$CACHE_MANAGER"
    fi

    # If local HAF cache doesn't exist or was removed, fetch from NFS via cache-manager
    if [[ ! -d "${HAF_SOURCE}/datadir" ]]; then
      echo "Local HAF cache not found, fetching from NFS via cache-manager..."
      "$CACHE_MANAGER" get haf "${HAF_COMMIT}" "${HAF_SOURCE}" || {
        echo "ERROR: Failed to fetch HAF data from NFS cache"
        exit 1
      }
      echo "HAF data fetched from NFS successfully"
    fi

    echo "Copying HAF replay data from ${HAF_SOURCE} to ${LOCAL_CACHE}..."
    mkdir -p "${LOCAL_CACHE}"
    # Use cache-manager copy for proper permission handling
    "$CACHE_MANAGER" copy "${HAF_SOURCE}" "${LOCAL_CACHE}" || {
      # Fallback to tar pipe if copy not supported
      if ! (cd "${HAF_SOURCE}" && sudo tar cf - .) | (cd "${LOCAL_CACHE}" && sudo tar xf -); then
        echo "ERROR: Failed to copy HAF data"
        exit 1
      fi
    }
    echo "HAF data copied successfully"

    # Create blockchain symlinks to shared block_log
    BLOCKCHAIN_DIR="${LOCAL_CACHE}/datadir/blockchain"
    SHARED_BLOCK_LOG="/blockchain/block_log_5m"
    if [[ ! -d "$BLOCKCHAIN_DIR" ]] && [[ -d "$SHARED_BLOCK_LOG" ]]; then
      echo "Creating blockchain symlinks to shared block_log"
      mkdir -p "$BLOCKCHAIN_DIR"
      for block_file in "$SHARED_BLOCK_LOG"/block_log* ; do
        if [[ -f "$block_file" ]]; then
          ln -sf "$block_file" "$BLOCKCHAIN_DIR/$(basename "$block_file")"
        fi
      done
    fi
    # Ensure blockchain dir is writable by hived (uid 1000)
    if [[ -d "$BLOCKCHAIN_DIR" ]]; then
      mkdir -p "$BLOCKCHAIN_DIR/haf_wal"
      chown -R 1000:100 "$BLOCKCHAIN_DIR" 2>/dev/null || chmod -R 777 "$BLOCKCHAIN_DIR" 2>/dev/null || true
    fi

    echo "HAF data prepared at: ${LOCAL_CACHE}"
    ls -la "${LOCAL_CACHE}/datadir/" || true
    fi  # end of SYNC_SKIPPED check
  script:
  - |
    # Check if sync was skipped in before_script (QUICK_TEST or AUTO_SKIP_SYNC mode)
    if [[ -f "${CI_PROJECT_DIR}/.sync_skipped" ]]; then
      echo "=== Sync skipped (using cached data) ==="
      exit 0
    fi

    # Check if valid hivemind sync cache already exists on NFS
    # If so, skip sync entirely - e2e job will use the cached data directly
    NFS_TAR="${DATA_CACHE_NFS_PREFIX}/${SYNC_CACHE_TYPE}/${SYNC_CACHE_KEY}.tar"
    if [[ -f "$NFS_TAR" ]]; then
      echo "=== Hivemind sync cache found at $NFS_TAR ==="
      echo "Skipping sync - e2e job will use cached data directly"
      echo "To force re-sync, delete the cache file or use cleanup_hivemind_haf_cache_manual job"
      exit 0
    fi

    echo "=== Starting hivemind sync with docker-compose ==="
    echo "No existing cache found at $NFS_TAR - running full sync"

    # Export variables for docker-compose
    export HAF_IMAGE="${HAF_IMAGE_NAME}"
    export HIVEMIND_IMAGE="${HIVEMIND_IMAGE}"
    export HAF_DATADIR="${DATA_CACHE_HIVEMIND_DATADIR}"
    export HAF_SHM_DIR="${DATA_CACHE_HIVEMIND_SHM_DIR}"
    export RUNNER_HIVEMIND_SYNC_MAX_BLOCK="${RUNNER_HIVEMIND_SYNC_MAX_BLOCK}"
    export ADD_MOCKS="${ADD_MOCKS}"

    echo "HAF_IMAGE: ${HAF_IMAGE}"
    echo "HIVEMIND_IMAGE: ${HIVEMIND_IMAGE}"
    echo "HAF_DATADIR: ${HAF_DATADIR}"
    echo "RUNNER_HIVEMIND_SYNC_MAX_BLOCK: ${RUNNER_HIVEMIND_SYNC_MAX_BLOCK}"

    # Start docker-compose
    docker compose -f "${COMPOSE_FILE}" up -d haf

    # Wait for HAF to be healthy
    echo "Waiting for HAF PostgreSQL to be healthy..."
    WAIT_TIMEOUT=300
    WAIT_START=$(date +%s)
    until docker compose -f "${COMPOSE_FILE}" exec -T haf pg_isready -U haf_admin -d haf_block_log > /dev/null 2>&1; do
      if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
        echo "ERROR: Timeout waiting for HAF PostgreSQL after ${WAIT_TIMEOUT}s"
        docker compose -f "${COMPOSE_FILE}" logs haf
        exit 1
      fi
      sleep 5
    done
    echo "HAF PostgreSQL is ready"

    # Run hivemind-setup (blocking, wait for completion)
    echo "Running hivemind setup..."
    docker compose -f "${COMPOSE_FILE}" run --rm hivemind-setup

    # Run hivemind-sync (blocking, wait for completion)
    echo "Running hivemind sync..."
    docker compose -f "${COMPOSE_FILE}" run --rm hivemind-sync

    echo "Hivemind sync completed successfully"

    # Extract version info from hivemind container
    docker compose -f "${COMPOSE_FILE}" run --rm --entrypoint /bin/bash hivemind-sync -c \
      "cat /home/hivemind/.hivemind-venv/lib/python*/site-packages/hive/_version.py" > version.log || true

    # Collect DB stats
    docker compose -f "${COMPOSE_FILE}" exec -T haf psql -U haf_admin -d haf_block_log -c "
      SELECT schemaname, relname, n_live_tup, n_dead_tup, last_vacuum, last_autovacuum
      FROM pg_stat_user_tables
      WHERE schemaname IN ('hivemind_app', 'reptracker_app')
      ORDER BY n_live_tup DESC
      LIMIT 20;
    " > pg-stats.txt || true
    mkdir -p pg-stats
    mv pg-stats.txt pg-stats/ || true

    # Collect container logs before shutdown
    docker compose -f "${COMPOSE_FILE}" logs haf > hivemind-sync.log 2>&1 || true

    # Force PostgreSQL checkpoint before shutdown
    echo "Forcing PostgreSQL checkpoint..."
    docker compose -f "${COMPOSE_FILE}" exec -T haf psql -U haf_admin -d haf_block_log -c "CHECKPOINT;" || true

    # Graceful shutdown with 120s timeout for PostgreSQL
    # Longer timeout prevents SIGKILL which would trigger crash recovery on next start
    echo "Shutting down docker-compose with 120s timeout..."
    docker compose -f "${COMPOSE_FILE}" down --timeout 120 || true

    echo "Docker-compose shutdown complete"

    # Now PostgreSQL is stopped, safe to push to cache
    # This is in script section (not after_script) to ensure reliable execution
    # Fetch cache-manager from common-ci-configuration
    CACHE_MANAGER="/tmp/cache-manager.sh"
    if [[ ! -x "$CACHE_MANAGER" ]]; then
      echo "Downloading cache-manager.sh from common-ci-configuration..."
      curl -fsSL "https://gitlab.syncad.com/hive/common-ci-configuration/-/raw/develop/scripts/cache-manager.sh" -o "$CACHE_MANAGER"
      chmod +x "$CACHE_MANAGER"
      echo "cache-manager.sh downloaded ($(wc -c < "$CACHE_MANAGER") bytes)"
    fi
    echo "Pushing hivemind sync data to NFS cache: ${SYNC_CACHE_TYPE}/${SYNC_CACHE_KEY}"
    echo "Source path: ${DATA_CACHE_HIVEMIND}"
    ls -la "${DATA_CACHE_HIVEMIND}/" 2>/dev/null | head -5 || echo "Warning: Cannot list source directory"
    # Run cache-manager with debug output
    export DEBUG=1
    echo "Running: cache-manager put ${SYNC_CACHE_TYPE} ${SYNC_CACHE_KEY} ${DATA_CACHE_HIVEMIND}"
    if ! "$CACHE_MANAGER" put "${SYNC_CACHE_TYPE}" "${SYNC_CACHE_KEY}" "${DATA_CACHE_HIVEMIND}" 2>&1; then
      echo "ERROR: cache-manager put failed (exit code: $?). Debug info:"
      echo "NFS path: ${DATA_CACHE_NFS_PREFIX:-/nfs/ci-cache}"
      ls -la "${DATA_CACHE_NFS_PREFIX:-/nfs/ci-cache}/" 2>/dev/null | head -5 || echo "Cannot list NFS root"
      ls -la "${DATA_CACHE_NFS_PREFIX:-/nfs/ci-cache}/${SYNC_CACHE_TYPE}/" 2>/dev/null | head -5 || echo "Cannot list NFS type dir"
      # Try running bash with verbose
      echo "Re-running with bash -x for debugging:"
      bash -x "$CACHE_MANAGER" put "${SYNC_CACHE_TYPE}" "${SYNC_CACHE_KEY}" "${DATA_CACHE_HIVEMIND}" 2>&1 | head -50 || true
      echo "Warning: Failed to push to NFS cache - e2e job may fail if running on different builder"
    fi
  after_script:
  - |
    # Skip after_script if sync was skipped (using cached data)
    if [[ -f "${CI_PROJECT_DIR}/.sync_skipped" ]]; then
      echo "=== Sync was skipped - no cleanup needed ==="
      exit 0
    fi

    # Only cleanup that might be needed if job failed mid-execution
    # Main shutdown and cache push is now in script section
    echo "=== Cleanup (if needed) ==="
    docker compose -f "${COMPOSE_FILE}" down --timeout 30 2>/dev/null || true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
    - hivemind-sync.log
    - pg-stats
    - version.log
  tags:
  - data-cache-storage
  - fast
  - fastest

e2e_benchmark_on_postgrest:
  image: "$HIVE_CI_BASE_IMAGE"
  stage: benchmark
  interruptible: true
  needs:
  - job: detect_changes
    artifacts: true
    optional: true  # Optional for tagged builds
  - job: replay_data_copy
    artifacts: true
  - job: prepare_hivemind_image
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: sync
    artifacts: true
  when: on_success
  services:
  - *haf-instance-with-nfs-fallback
  - name: $HIVEMIND_IMAGE
    alias: hivemind-smoketest   # cannot be a variable
    entrypoint:
    - bash
    - -c
    - *hivemind-postgrest-serve-script
    variables:
      WORKING_DIR: /home/hivemind
      LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/hivemind-server.log
      LOG_LEVEL: "info" # change to "debug" for more info
      REQUEST_PATH_LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/request_process_times_smoketests.log
  - name: $HIVEMIND_IMAGE
    alias: hivemind-benchmark   # cannot be a variable
    entrypoint:
    - bash
    - -c
    - *hivemind-postgrest-serve-script
    variables:
      WORKING_DIR: /home/hivemind
      LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/hivemind-benchmark-server.log
      LOG_LEVEL: "info" # change to "debug" for more info
      REQUEST_PATH_LOG_PATH: $DATA_CACHE_HIVEMIND_DATADIR/request_process_times.log
  variables:
    HIVED_UID: $HIVED_UID
    JOB_TOKEN: $CI_JOB_TOKEN
    RUNNER_HIVEMIND_BENCHMARK_URL: http://$RUNNER_HIVEMIND_BENCHMARK_SERVER_HOSTNAME
    RUNNER_HIVEMIND_SMOKETEST_URL: http://$RUNNER_HIVEMIND_SMOKETEST_SERVER_HOSTNAME
    # TODO: As you complete the migration of methods to SQL, uncomment variables and add finished method names.
    # Missing variable enables the entire test group.
    RUN_TESTS_WITH_MARKER: "not postgrest_ignore"
    CI_DEBUG_SERVICES: "true" # Debugging service startup issues
    # Set FORCE_NFS_CACHE=1 to skip local cache and always extract from NFS (for debugging)
    FORCE_NFS_CACHE: "${FORCE_NFS_CACHE:-0}"
  before_script:
  - *extract-nfs-cache-before-script
  - pip install --quiet tox
  script:
  - |
    echo "HAF image name $HAF_IMAGE_NAME"
    echo "Hivemind image name $HIVEMIND_IMAGE"
    echo "Waiting for Hivemind smoketest server..."
    WAIT_TIMEOUT=600  # 10 minutes
    WAIT_START=$(date +%s)
    until python3 -c "import urllib.request; urllib.request.urlopen('http://${RUNNER_HIVEMIND_SMOKETEST_SERVER_HOSTNAME}:${RUNNER_HIVEMIND_SERVER_HTTP_PORT}/', timeout=5)" > /dev/null 2>&1; do
      if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
        echo "ERROR: Timeout waiting for Hivemind smoketest server after ${WAIT_TIMEOUT}s"
        exit 1
      fi
      sleep 2
    done
    echo "Hivemind smoketest instance is running"
  - |
    # Debug: check database content directly via psql (optional - psql may not be installed)
    echo "=== DEBUG: Checking database content ==="
    if command -v psql &> /dev/null; then
      psql "postgresql://haf_admin@haf-instance:5432/haf_block_log" << 'SQLEOF'
    -- Check what schemas exist
    SELECT 'Schemas:' as info, string_agg(schema_name, ', ') as schemas
    FROM information_schema.schemata WHERE schema_name NOT IN ('pg_catalog', 'information_schema', 'pg_toast');

    -- Check what tables exist in hive schema
    SELECT 'hive tables:' as info, string_agg(table_name, ', ') as tables
    FROM information_schema.tables WHERE table_schema = 'hive';

    -- Check tablespace
    SELECT 'Tablespaces:' as info, spcname, pg_tablespace_location(oid) as location FROM pg_tablespace;

    -- Check core HAF data
    SELECT 'hive.blocks count' as table_name, count(*) as row_count FROM hive.blocks;
    SELECT 'hive.accounts count' as table_name, count(*) as row_count FROM hive.accounts;

    -- Check hivemind app data
    SELECT 'hivemind_app.hive_accounts count' as table_name, count(*) as row_count FROM hivemind_app.hive_accounts;
    SELECT 'hivemind_app.hive_posts count' as table_name, count(*) as row_count FROM hivemind_app.hive_posts;

    -- Check if gtg exists
    SELECT 'gtg in hive.accounts' as check_name, EXISTS(SELECT 1 FROM hive.accounts WHERE name='gtg') as exists;
    SELECT 'gtg in hivemind_app.hive_accounts' as check_name, EXISTS(SELECT 1 FROM hivemind_app.hive_accounts WHERE name='gtg') as exists;

    -- Check hivemind_endpoints schema
    SELECT 'hivemind_endpoints functions' as check_name, count(*) as count
    FROM information_schema.routines
    WHERE routine_schema = 'hivemind_endpoints';

    -- Check sample account from hive.accounts
    SELECT 'Sample hive.accounts' as info, name FROM hive.accounts LIMIT 5;
    SQLEOF
    else
      echo "psql not available, skipping database debug check"
    fi
    echo "=== END DB DEBUG ==="
  - |
    # Debug: test API calls using Python (curl not available in container)
    echo "=== DEBUG: Testing API responses ==="
    python3 << 'PYEOF'
    import json
    import urllib.request

    HOST = "hivemind-smoketest"
    PORT = "8080"
    URL = f"http://{HOST}:{PORT}/"

    tests = [
        {"jsonrpc": "2.0", "method": "condenser_api.get_follow_count", "params": ["gtg"], "id": 1},
        {"jsonrpc": "2.0", "method": "condenser_api.get_followers", "params": ["gtg", "", "blog", 1], "id": 2},
        {"jsonrpc": "2.0", "method": "bridge.get_trending_topics", "params": {}, "id": 3},
    ]

    for test in tests:
        print(f"\n--- Testing: {test['method']} ---")
        try:
            req = urllib.request.Request(URL, data=json.dumps(test).encode(), headers={"Content-Type": "application/json"})
            with urllib.request.urlopen(req, timeout=10) as resp:
                data = resp.read().decode()
                print(f"Response: {data[:2000]}")
        except Exception as e:
            print(f"Error: {e}")
    PYEOF
    echo "=== END DEBUG ==="
  - *condenser_api_smoketest-script
  - *condenser_api_smoketest_negative-script
  - *follow_api_smoketest-script
  - *follow_api_smoketest_negative-script
  - *bridge_api_smoketest-script
  - *bridge_api_smoketest_negative-script
  - *tags_api_smoketest-script
  - *tags_api_smoketest_negative-script
  - *database_api_smoketest-script
  - *database_api_smoketest_negative-script
  - *rest_api_smoketest-script
  - *rest_api_negative_smoketest-script
  - *hive_api_smoketest-script
  - *search-api_smoketest-script
  - *postgrest_negative-script
  - *mock_tests-script
  - |
    echo "Waiting for Hivemind benchmark server..."
    WAIT_TIMEOUT=600  # 10 minutes
    WAIT_START=$(date +%s)
    until python3 -c "import urllib.request; urllib.request.urlopen('http://${RUNNER_HIVEMIND_BENCHMARK_SERVER_HOSTNAME}:${RUNNER_HIVEMIND_SERVER_HTTP_PORT}/', timeout=5)" > /dev/null 2>&1; do
      if [[ $(($(date +%s) - WAIT_START)) -gt $WAIT_TIMEOUT ]]; then
        echo "ERROR: Timeout waiting for Hivemind benchmark server after ${WAIT_TIMEOUT}s"
        exit 1
      fi
      sleep 2
    done
    echo "Hivemind benchmark instance is running"
    # TODO: Uncomment anchors to enable a test group. To test only selected methods, add their names to the environment variable
    # - *api-benchmark-script
  after_script:
  - |
    echo -e "\e[0Ksection_start:$(date +%s):logs[collapsed=true]\r\e[0KCollecting logs..."
    ls -lah "${DATA_CACHE_HIVEMIND_DATADIR}"
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/${CI_JOB_NAME}.log" "haf-$CI_JOB_NAME.log" || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/request_process_times_smoketests.log" request_process_times_smoketests.log || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/hivemind-server.log" hivemind-server.log || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/request_process_times.log" request_process_times.log || true
    cp "${DATA_CACHE_HIVEMIND_DATADIR}/hivemind-benchmark-server.log" hivemind-benchmark-server.log || true
    echo -e "\e[0Ksection_end:$(date +%s):logs\r\e[0K"
  - |
    echo -e "\e[0Ksection_start:$(date +%s):dotenv[collapsed=true]\r\e[0KPreparing dotenv file..."
    {
      echo "ARTIFACTS_JOB_ID=$CI_JOB_ID"
      echo "APP_VERSION=$(python -c "with open('version.log') as f:  exec(f.read()); print(__version__)")"
      echo "SERVER_NAME=$CI_RUNNER_DESCRIPTION"
    } > variables.env
    cat variables.env
    echo -e "\e[0Ksection_end:$(date +%s):dotenv\r\e[0K"
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: "*.xml"
      dotenv: variables.env
    paths:
    - "*.xml"
    - haf-$CI_JOB_NAME.log
    - hivemind-sync.log
    - hivemind-server.log
    - hivemind-benchmark-server.log
    - pg-stats
    - tests/api_tests/hivemind/tavern/**/*.out.json
    - request_process_times.log
    - request_process_times_smoketests.log
    - version.log
  tags:
  - data-cache-storage
  - fast
  - fastest

python_api_client_test:
  extends: .project_develop_configuration_template
  stage: tests
  image: "${PYTHON_COMPAT_IMAGE}"
  needs:
  - job: generate_python_api_client
    artifacts: true
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  before_script:
  - poetry -C "${PYPROJECT_DIR}" lock
  - poetry -C "${PYPROJECT_DIR}" install
  script:
  - poetry run -C "${PYPROJECT_DIR}" pytest "${PYPROJECT_DIR}/api_client_tests"
  allow_failure: true  # External API (api.syncad.com) dependency - may fail if API is unavailable
  tags:
  - public-runner-docker

build_and_publish_image:
  stage: publish
  extends: .publish_docker_image_template
  before_script:
  - !reference [.publish_docker_image_template, before_script]
  script:
  - |
    TAG=$(echo "$CI_COMMIT_TAG" | sed 's/[!+]/-/g')
    scripts/ci-helpers/build_and_publish_instance.sh --image-tag=$TAG
    docker tag "$CI_REGISTRY_IMAGE/postgrest-rewriter:$TAG" "registry-upload.hive.blog/hivemind/postgrest-rewriter:$TAG"
    docker push "registry-upload.hive.blog/hivemind/postgrest-rewriter:$TAG"
  tags: *shared_tags

deploy_python_api_package_to_gitlab:
  stage: publish
  needs:
  - job: build_python_api_client_wheel
    artifacts: true
  - job: generate_python_api_client
    artifacts: true
  - job: python_api_client_test
  extends: .deploy_wheel_to_gitlab_template
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  when: on_success
  tags:
  - public-runner-docker

Trigger benchmark-results-collector:
  stage: collector
  needs:
  - job: e2e_benchmark_on_postgrest
    artifacts: true   # Even though variables.env is not a regular artifact, but a dotenv report, this still needs to be set to true
  # NOTE: This job is set to manual because the api-benchmark-script is currently
  # commented out in e2e_benchmark_on_postgrest, so request_process_times.log is not
  # generated. Re-enable automatic triggering when benchmarks are re-enabled.
  rules:
  - when: manual
    allow_failure: true
  variables:
    ARTIFACTS_URL: https://gitlab.syncad.com/api/v4/projects/$CI_PROJECT_ID/jobs/$ARTIFACTS_JOB_ID/artifacts
    PRIVATE_TOKEN: $READ_ARTIFACT_ACCESS_TOKEN
    #description:
    SOURCE: hivemind
    JOB_ID: $ARTIFACTS_JOB_ID
    DESC: "hivemind CI"
    EXEC_ENV_DESC: "branch=$CI_COMMIT_REF_SLUG"
    SERVER_NAME: "$SERVER_NAME"
    APP_VERSION: "$APP_VERSION"
    TESTSUITE_VERSION: "commit_short_sha=$CI_COMMIT_SHORT_SHA"
  trigger:
    project: hive/benchmark-results-collector
    branch: master
    strategy: depend


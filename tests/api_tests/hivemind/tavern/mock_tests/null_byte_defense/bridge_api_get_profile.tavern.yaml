---
  test_name: "Null byte defense: bridge.get_profile returns valid profile after sync processes account_update2 containing \\u0000 in metadata"

  marks:
    - patterntest

  includes:
    - !include ../../common.yaml

  stages:
    - name: test
      request:
        url: "{service.proto:s}://{service.server:s}:{service.port}/"
        method: POST
        headers:
          content-type: application/json
        json:
          jsonrpc: "2.0"
          id: 1
          method: "bridge.get_profile"
          params:
            account: "nulltester"
      response:
        status_code: 200
        verify_response_with:
          function: validate_response:has_valid_response

---
  test_name: "Null byte defense: condenser_api.get_content returns valid result after sync processes operation containing \\u0000 in json_metadata"

  marks:
    - patterntest

  includes:
    - !include ../../common.yaml

  stages:
    - name: test
      request:
        url: "{service.proto:s}://{service.server:s}:{service.port}/"
        method: POST
        headers:
          content-type: application/json
        json:
          jsonrpc: "2.0"
          id: 1
          method: "condenser_api.get_content"
          params: ["nulltester", "null-byte-post"]
      response:
        status_code: 200
        verify_response_with:
          function: validate_response:has_valid_response

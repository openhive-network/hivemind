---
  test_name: Hivemind - observer is required for get_reblogged_by_account

  marks:
    - patterntest


  includes:
    - !include ../../common.yaml

  stages:
    - name: test
      request:
        url: "{service.proto:s}://{service.server:s}:{service.port}/"
        method: POST
        headers:
          content-type: application/json
        json:
          jsonrpc: "2.0"
          id: 1
          method: "hive.get_reblogged_by_account"
          params: {"sort":"created","tag":"", "limit": 5}
      response:
        status_code: 200
        verify_response_with:
          function: validate_response:compare_response_with_pattern
          extra_kwargs:
            ignore_tags: ""

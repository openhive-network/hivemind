---
# Regression test: empirically `risman` returns count=0 in this 5M-block
# mocked sync, even though the mock contains both a vote_operation (block
# 5,000,021) and an effective_comment_vote_operation (block 5,000,021) for
# the same post. The hive_votes row ends up with last_update=1970-01-01
# (default), so the 8-day chain-time window filters it out. The exact
# indexer reason is left undiagnosed (likely a batch boundary between
# massive and live sync when --test-max-block=5,000,024 cuts at block
# 5,000,021); this test pins down the *observed* behaviour so any future
# indexer change that flips it shows up here.
  test_name: Hivemind

  marks:
    - patterntest

  includes:
    - !include ../../common.yaml

  stages:
    - name: test
      request:
        url: "{service.proto:s}://{service.server:s}:{service.port}/rpc/get_account_pending_curation_rewards"
        method: POST
        headers:
          content-type: application/json
          accept: application/json
        json:
          account-name: "risman"
      response:
        status_code: 200
        verify_response_with:
          function: validate_response:compare_rest_response_with_pattern

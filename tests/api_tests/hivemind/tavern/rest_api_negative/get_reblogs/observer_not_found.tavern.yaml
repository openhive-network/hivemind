---
  test_name: Hivemind

  marks:
    - patterntest
    - negative
    - postgrest_ignore

  includes:
    - !include ../../common.yaml

  stages:
    - name: test
      request:
        url: "{service.proto:s}://{service.server:s}:{service.port}/rpc/get_reblogs"
        method: POST
        headers:
          content-type: application/json
          accept: application/json
        json:
          sort: "trending"
          tag: ""
          observer: "notfound123"
          limit: 5
      response:
        status_code: 400
        verify_response_with:
          function: validate_response:compare_rest_response_with_pattern
          extra_kwargs:
            error_response: true
